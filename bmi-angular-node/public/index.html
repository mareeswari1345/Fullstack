<!DOCTYPE html>
<html ng-app="bmiApp">

<head>
<title>BMI Calculator</title>

<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#6a11cb,#2575fc);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.container{
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;
width:320px;
}

h2{
margin-bottom:20px;
color:#333;
}

input{
width:90%;
padding:10px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
font-size:16px;
}

button{
width:100%;
padding:12px;
background:#2575fc;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#1a5edb;
}

.result{
margin-top:20px;
padding:15px;
background:#f3f6ff;
border-radius:8px;
}

.bmi{
font-size:22px;
font-weight:bold;
color:#2575fc;
}

.category{
font-size:18px;
color:#444;
}

</style>

</head>

<body ng-controller="bmiController">

<div class="container">

<h2>BMI Calculator</h2>

<input type="number" ng-model="weight" placeholder="Enter Weight (kg)">

<input type="number" ng-model="height" placeholder="Enter Height (cm)">

<button ng-click="calculateBMI()">Calculate BMI</button>

<div class="result" ng-if="bmi">
<p class="bmi">BMI: {{bmi}}</p>
<p class="category">Category: {{category}}</p>
</div>

</div>

<script>

var app = angular.module("bmiApp", []);

app.controller("bmiController", function($scope, $http){

$scope.calculateBMI = function(){

$http.post("/calculateBMI",{
weight:$scope.weight,
height:$scope.height
})
.then(function(response){

$scope.bmi = response.data.bmi;
$scope.category = response.data.category;

});

};

});

</script>

</body>
</html>
